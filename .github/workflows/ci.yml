name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel any in-progress run on a branch when a new commit lands on it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ----- Static analysis: fmt + clippy ---------------------------------
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `@stable` qualifier - dtolnay/rust-toolchain reads
      # rust-toolchain.toml automatically and installs the exact version
      # pinned there, so CI and contributors always run the same clippy.
      - name: Install pinned toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt, clippy

      # eframe needs the GTK / wayland headers on Linux. Without these,
      # `cargo check` fails before clippy ever runs.
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ----- Unit tests on the native target -------------------------------
  test:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: cargo test
        run: cargo test --all-features --verbose

  # ----- The web build must keep compiling -----------------------------
  # This is the regression check for "the web timer panics" and similar
  # platform-specific breakage. We don't run the wasm binary, but if
  # `cargo check --target wasm32-unknown-unknown` passes, the cfg
  # branches are intact and link.
  wasm-check:
    name: wasm32 check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The wasm32 target is declared in rust-toolchain.toml, so it
      # gets installed automatically here too.
      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: cargo check --target wasm32-unknown-unknown
        run: cargo check --target wasm32-unknown-unknown --lib --bin maze_solver
