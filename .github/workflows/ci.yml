name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel any in-progress run on a branch when a new commit lands on it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ----- Static analysis: fmt + clippy ---------------------------------
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # actions-rust-lang/setup-rust-toolchain reads rust-toolchain.toml
      # automatically and installs the exact version, components, and
      # targets it declares. The pin in that file is the single source
      # of truth for what compiler CI and contributors use.
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      # eframe needs the GTK / wayland headers on Linux. Without these,
      # `cargo check` fails before clippy ever runs.
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ----- Unit tests on the native target -------------------------------
  test:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: cargo test
        run: cargo test --all-features --verbose

  # ----- The web build must keep compiling -----------------------------
  # This is the regression check for "the web timer panics" and similar
  # platform-specific breakage. We don't run the wasm binary, but if
  # `cargo check --target wasm32-unknown-unknown` passes, the cfg
  # branches are intact and link. The wasm32 target is declared in
  # rust-toolchain.toml, so it gets installed automatically.
  wasm-check:
    name: wasm32 check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: cargo check --target wasm32-unknown-unknown
        run: cargo check --target wasm32-unknown-unknown --lib --bin pathlab

  # ----- Coverage report -----------------------------------------------
  # Runs the test suite under cargo-llvm-cov (LLVM source-based coverage)
  # and uploads the LCOV report to Codecov. Public repos don't need a
  # token; private repos need a CODECOV_TOKEN secret.
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate LCOV coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          # token is read from repo secrets automatically when set;
          # public repos don't need one.
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
